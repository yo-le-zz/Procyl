name: Procyl Release

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  tests:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest toml
          pip install .

      - name: Run tests
        run: pytest tests -v

      - name: Read version from pyproject.toml
        id: version
        run: |
          echo "version=$(python -c "import toml; print(toml.load('pyproject.toml')['project']['version'])")" >> $GITHUB_OUTPUT

      - name: Create Git tag
        run: |
          VERSION=${{ steps.version.outputs.version }}

          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag already exists, skipping"
            exit 0
          fi

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag v$VERSION
          git push origin v$VERSION

  build-linux:
    needs: tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install build

      - run: python -m build

      - name: Rename wheel for Linux
        run: |
          cd dist
          for f in procyl-*-py3-none-any.whl; do
            mv "$f" "${f%-py3-none-any.whl}-py3-none-linux_x86_64.whl"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: dist-linux
          path: dist/

  build-windows:
    needs: tests
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install build

      - run: python -m build

      - name: Rename wheel for Windows
        run: |
          cd dist
          Get-ChildItem "procyl-*-py3-none-any.whl" | Rename-Item -NewName { $_.Name -replace '-py3-none-any.whl', '-py3-none-win_amd64.whl' }
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: dist-windows
          path: dist/

  build-macos:
    needs: tests
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install build

      - run: python -m build

      - name: Rename wheel for macOS
        run: |
          cd dist
          for f in procyl-*-py3-none-any.whl; do
            mv "$f" "${f%-py3-none-any.whl}-py3-none-macosx_10_9_x86_64.whl"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: dist-macos
          path: dist/

  release:
    needs: [tests, build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest

    steps:
      - name: Download Linux dist
        uses: actions/download-artifact@v4
        with:
          name: dist-linux
          path: dist/linux

      - name: Download Windows dist
        uses: actions/download-artifact@v4
        with:
          name: dist-windows
          path: dist/windows

      - name: Download macOS dist
        uses: actions/download-artifact@v4
        with:
          name: dist-macos
          path: dist/macos

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.tests.outputs.version }}
          name: Procyl v${{ needs.tests.outputs.version }}
          files: |
            dist/linux/*.whl
            dist/linux/*.tar.gz
            dist/windows/*.whl
            dist/macos/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}